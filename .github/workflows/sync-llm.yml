name: Sync health deadlines from venue websites

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Sync from venue websites
        run: pnpm sync:llm
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SYNC_REPORT_PATH: ${{ runner.temp }}/sync-report.md
      - name: Validate YAML data
        run: pnpm validate
      - name: Open or update PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: auto/sync-llm
          add-paths: |
            public/data/conferences.yaml
            scripts/sync-llm/venues.json
          commit-message: "chore(data): sync health deadlines from venue websites"
          title: "chore(data): sync health deadlines from venue websites"
          body-path: ${{ runner.temp }}/sync-report.md
          delete-branch: true
