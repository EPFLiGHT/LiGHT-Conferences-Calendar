name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let in-progress deployments finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Injects output: 'export', basePath and unoptimized images into
          # next.config so the build produces the static ./out directory.
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install
      - name: Validate YAML data
        run: pnpm validate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Run tests
        run: pnpm test
      # API routes cannot be statically exported; move them aside for the
      # Pages build (they are only deployed on Vercel).
      - name: Temporarily disable API routes for static export
        run: |
          if [ -d "src/app/api" ]; then
            mv src/app/api /tmp/api-backup
          fi
      - name: Build with Next.js
        run: pnpm next build
      - name: Restore API routes
        run: |
          if [ -d "/tmp/api-backup" ]; then
            mv /tmp/api-backup src/app/api
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
