name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Validate YAML data
        run: pnpm validate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Run tests
        run: pnpm test
      - name: Build
        run: pnpm build
